name: Matrix Demo

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [12, 14, 16]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Run server (basic check)
        run: node index.js

      - name: Run Matrix Job
        run: echo "Running on Node version ${{ matrix.node }}"